name: Run Evaluation

on:
  workflow_dispatch:
    inputs:
      test_file:
        description: "Path to test JSONL (e.g. evaluation/data/technical-accuracy-tests/smoke-test.jsonl)"
        required: true
        default: "evaluation/data/technical-accuracy-tests/smoke-test.jsonl"
      agent_file:
        description: "Path to agent definition (e.g. agents/learn-unit-writer.agent.md)"
        required: true
        default: "agents/learn-unit-writer.agent.md"
      results_file:
        description: "Path to write results JSONL (e.g. evaluation/data/technical-accuracy-results/smoke-test-results.jsonl)"
        required: true
        default: "evaluation/data/technical-accuracy-results/smoke-test-results.jsonl"

jobs:
  evaluate:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      models: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install openai

      - name: Generate responses
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TEST_FILE: ${{ github.event.inputs.test_file }}
          AGENT_FILE: ${{ github.event.inputs.agent_file }}
          RESULTS_FILE: ${{ github.event.inputs.results_file }}
        run: python evaluation/scripts/run_eval.py

      - name: Compare responses to ground truth
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RESULTS_FILE: ${{ github.event.inputs.results_file }}
        run: python evaluation/scripts/compare.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ github.event.inputs.results_file }} reports/
          git diff --cached --quiet || git commit -m "chore: add evaluation results [skip ci]"
          git push
